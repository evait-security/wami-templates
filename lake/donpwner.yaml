description: DonPwner is an advanced penetration testing tool designed for credential analysis and domain controller attacks by leveraging DonPAPI database results. It features safe password spray attacks with smart delay and jitter mechanisms to prevent account lockouts while automatically removing successfully authenticated users from the target list. The tool also supports credential analysis against secretsdump files and integrates with common security tools like NetExec for comprehensive security assessments.
