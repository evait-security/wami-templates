description: TaskHound is a Windows privileged scheduled task discovery tool designed to hunt for tasks running with privileged accounts and stored credentials. It enumerates tasks over the SMB protocol, parses XML task definitions, and identifies high-value attack opportunities through integration with BloodHound. The tool supports both BloodHound CE and legacy instances, provides OpenGraph support for visualization, and integrates with LAPS to automatically retrieve and use passwords for per-host authentication.
