description: TaskHound is a security tool designed to discover and enumerate Windows scheduled tasks that run with privileged accounts or stored credentials across remote systems. It utilizes SMB to access and parse task XML files identifying high-value targets such as Domain Admins or Enterprise Admins. The tool features deep integration with BloodHound for attack path visualization and supports LAPS for automated credential retrieval and authentication during the scanning process.
