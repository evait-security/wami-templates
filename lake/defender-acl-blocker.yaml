description: A utility written in Go that disables Microsoft Defender user space components by applying deny Access Control List rules to specific files and services. It allows users to target specific DLLs or executables and manage service permissions to prevent the antivirus from functioning. The tool supports obfuscated builds using Garble and includes a removal feature to restore original permissions.
