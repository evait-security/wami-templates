description: VMkatz is a specialized tool designed for red team engagements to extract Windows credentials directly from virtual machine memory snapshots and virtual disks without requiring full file exfiltration. It targets files such as vmdk, vmsn, and sav to retrieve NTLM hashes, DPAPI master keys, Kerberos tickets, and cached domain credentials locally. This approach is particularly effective when dealing with large virtual machine images over slow network connections where traditional exfiltration is impractical.
